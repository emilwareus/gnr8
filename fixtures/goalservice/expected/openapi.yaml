# EXPECTED OpenAPI — acceptance target, NOT generated by this plan.
#
# This is the hand-authored OpenAPI 3.1.0 document that gnr8 MUST eventually emit
# from the goalservice fixture (CONTEXT D-04, D-15). Plan 01-03 wires the
# red-by-design tests that compare generated output against this contract; today
# nothing produces or asserts it. Kept scoped and reviewable, not exhaustive.
#
# Type mapping applied (TARGET-API.md §4):
#   uuid.UUID      -> {type: string, format: uuid}
#   time.Time      -> {type: string, format: date-time}
#   *float64       -> {type: number} (optional, not in required)
#   []uuid.UUID    -> {type: array, items: {string, format: uuid}}
#   map[string]any -> {type: object, additionalProperties: true}  (see diagnostics)
#   named string + consts -> string enum
#   embedded struct -> flattened/promoted fields
#   nested struct   -> $ref
openapi: 3.1.0
info:
  title: goalservice
  version: 0.1.0
  description: >-
    Goal CRUD + list-with-query-filters fixture service. The auth middleware on
    the route group lowers to a security requirement on every operation.

security:
  - ApiKeyAuth: []

paths:
  /goal/:
    post:
      summary: Create goal
      operationId: createGoal
      tags: [Goals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalInput'
      responses:
        '201':
          description: Goal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandMessageWithUUID'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError'

  /goal/list:
    get:
      summary: List goals
      operationId: listGoals
      tags: [Goals]
      parameters:
        - name: cursor
          in: query
          required: false
          description: Cursor UUID for pagination
          schema:
            type: string
        - name: page_size
          in: query
          required: false
          description: Page size
          schema:
            type: string
        - name: aggregation
          in: query
          required: true
          description: Aggregation
          schema:
            type: string
            enum: [count, sum, avg, min, max]
      responses:
        '200':
          description: Goals page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGoalsOutput'

  /goal/{uuid}:
    put:
      summary: Update goal
      operationId: goalUuidPut
      tags: [Goals]
      parameters:
        - name: uuid
          in: path
          required: true
          description: Goal UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalInput'
      responses:
        '200':
          description: Goal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandMessage'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError'
        '404':
          description: Goal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError'
    delete:
      summary: Delete goal
      operationId: deleteGoal
      tags: [Goals]
      parameters:
        - name: uuid
          in: path
          required: true
          description: Goal UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Goal deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandMessage'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    TargetDirection:
      type: string
      enum: [gte, lte]
      description: Closed vocabulary — gte (higher is better) or lte (lower is better).

    GoalAnalyticsQuery:
      type: object
      required: [metric]
      properties:
        metric:
          type: string
          description: Analytics metric to evaluate
        windowDays:
          type: integer
          format: int64
          description: Rolling window size in days
        includePast:
          type: boolean
          description: Whether to include historical data points

    CreateGoalInput:
      type: object
      required: [name, analyticsQuery]
      properties:
        name:
          type: string
          description: Short human-readable goal name
        description:
          type: string
          description: Longer explanation
        analyticsQuery:
          $ref: '#/components/schemas/GoalAnalyticsQuery'
        targetValue:
          type: number
          description: Optional target value. NOTE diagnostic — number narrows to float32 in the Go SDK.
        targetDirection:
          $ref: '#/components/schemas/TargetDirection'
        workflowChainIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateGoalInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        analyticsQuery:
          $ref: '#/components/schemas/GoalAnalyticsQuery'
        targetValue:
          type: number
        targetDirection:
          $ref: '#/components/schemas/TargetDirection'
        workflowChainIds:
          type: array
          items:
            type: string
            format: uuid

    GoalResponse:
      type: object
      required: [uuid, name]
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        analyticsQuery:
          $ref: '#/components/schemas/GoalAnalyticsQuery'
        targetValue:
          type: number
        targetDirection:
          $ref: '#/components/schemas/TargetDirection'
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
          description: Free-form map (map[string]any). NOTE diagnostic — additionalProperties true.

    ListGoalsOutput:
      type: object
      required: [goals, pageSize, total]
      properties:
        goals:
          type: array
          items:
            $ref: '#/components/schemas/GoalResponse'
        nextCursor:
          type: string
          format: uuid
        pageSize:
          type: integer
          format: int64
        total:
          type: integer
          format: int64

    HttpError:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: error message
        slug:
          type: string
          example: error-slug
        hints:
          type: array
          items:
            type: string

    CommandMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # Embedded CommandMessage is flattened: "message" is promoted into this schema.
    CommandMessageWithUUID:
      type: object
      required: [message, uuid]
      properties:
        message:
          type: string
        uuid:
          type: string
          format: uuid
