# One-shot release: prepare the version commit locally, gate and smoke that exact revision, then
# atomically push main + vX.Y.Z before optional publication and release assets.

name: Release

on:
  workflow_dispatch:
    inputs:
      publish_crates:
        description: Publish the public gnr8 crate to crates.io after tag
        type: boolean
        default: true
      publish_cli:
        description: Build CLI and upload archives to the GitHub Release for this tag
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-and-tag:
    name: Prepare, gate, smoke, then tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN != '' && secrets.WORKFLOW_PUSH_TOKEN || github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v6
        with:
          go-version-file: goextract/go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python test dependencies
        run: python -m pip install PyYAML==6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Sync main
        run: git pull --rebase origin main

      - name: Bump release version
        id: bump
        run: |
          new="$(python3 scripts/bump-workspace-version.py)"
          echo "version=$new" >> "$GITHUB_OUTPUT"

      - name: Refresh Cargo.lock
        run: cargo build --workspace

      - name: Create version commit locally
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock 'examples/*/.gnr8/Cargo.lock'
          if git diff --staged --quiet; then
            echo "::error::No version changes to commit."
            exit 1
          fi
          git commit -m "chore(release): bump crate version to ${NEW_VERSION}"

      - name: Full release gate on versioned commit
        run: make check

      - name: Package and smoke host archive
        env:
          TARGET: x86_64-unknown-linux-gnu
          ASSET_OS: linux
          ASSET_ARCH: x86_64
        run: |
          set -euo pipefail
          scripts/package-release.sh
          scripts/smoke-release-archive.sh \
            target/release-local-dist/dist/gnr8-linux-x86_64.tar.gz

      - name: Verify crates.io package
        run: DRY_RUN=1 ./scripts/publish-crates.sh

      - name: Atomically push gated commit and tag
        id: metadata
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${NEW_VERSION}"
          git tag -a "${TAG}" -m "gnr8 ${NEW_VERSION}"
          git push --atomic origin HEAD:main "refs/tags/${TAG}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  crates-io:
    name: Publish crates.io
    needs: bump-and-tag
    if: github.ref == 'refs/heads/main' && inputs.publish_crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CRATES_IO_TOKEN:-}" ]]; then
            echo "::error::CRATES_IO_TOKEN is not set."
            exit 1
          fi
          ./scripts/publish-crates.sh

  build-cli:
    name: CLI ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    needs: bump-and-tag
    if: github.ref == 'refs/heads/main' && inputs.publish_cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_os: linux
            asset_arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            asset_os: linux
            asset_arch: aarch64
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            asset_os: macos
            asset_arch: x86_64
            target: x86_64-apple-darwin
          - runner: macos-15
            asset_os: macos
            asset_arch: aarch64
            target: aarch64-apple-darwin
          - runner: windows-latest
            asset_os: windows
            asset_arch: x86_64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Linux aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and package gnr8
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ASSET_OS: ${{ matrix.asset_os }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: scripts/package-release.sh

      - uses: actions/upload-artifact@v6
        with:
          name: gnr8-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: target/release-local-dist/dist/*
          if-no-files-found: error

  github-release-cli:
    name: GitHub Release assets
    needs: [bump-and-tag, build-cli]
    if: github.ref == 'refs/heads/main' && inputs.publish_cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          shopt -s nullglob
          files=(dist/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No artifacts in dist/"
            exit 1
          fi
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --repo "${REPO}" --clobber
          else
            gh release create "${TAG}" "${files[@]}" \
              --repo "${REPO}" \
              --title "gnr8 ${VERSION}" \
              --notes "Install with the archive assets below, or run: \`curl -fsSL https://raw.githubusercontent.com/${REPO}/main/scripts/install.sh | bash\`. See [docs/RELEASE.md](https://github.com/${REPO}/blob/main/docs/RELEASE.md)."
          fi
