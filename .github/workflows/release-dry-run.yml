# Exercise release builds and packaging on every branch/PR without publishing:
# no version bump, no tag, no crates.io upload, no GitHub Release.

name: Release dry-run

on:
  pull_request:
  push:

concurrency:
  group: release-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  crates-publish-dry-run:
    name: crates.io publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo publish --dry-run
        run: DRY_RUN=1 ./scripts/publish-crates.sh

  build-cli:
    name: CLI ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_os: linux
            asset_arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            asset_os: linux
            asset_arch: aarch64
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            asset_os: macos
            asset_arch: x86_64
            target: x86_64-apple-darwin
          - runner: macos-15
            asset_os: macos
            asset_arch: aarch64
            target: aarch64-apple-darwin
          - runner: windows-latest
            asset_os: windows
            asset_arch: x86_64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Linux aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and package gnr8
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ASSET_OS: ${{ matrix.asset_os }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: scripts/package-release.sh

      - uses: actions/upload-artifact@v6
        with:
          name: gnr8-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: target/release-local-dist/dist/*
          if-no-files-found: error

